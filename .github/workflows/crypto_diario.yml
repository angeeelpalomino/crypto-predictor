name: Análisis Diario de Criptomonedas

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  analizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install yfinance tensorflow scikit-learn \
                      pandas numpy matplotlib seaborn

      - name: Ejecutar análisis de criptomonedas
        run: python analizar_cryptos.py

      - name: Enviar reporte por correo
        run: python enviar_correo.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          DESTINATARIO: "000042@edgehub.edu.mx"

      - name: Publicar reporte
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reporte/
          git diff --staged --quiet || git commit -m "Reporte automático $(date +'%Y-%m-%d')"
          git push
